<!doctype html>
<html lang="en">
  <head>
    <title>Attorney Online session</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An off-the-cuff courtroom drama simulator"
    />
    <meta name="author" content="stonedDiscord" />
    <meta property="og:title" content="Attorney Online" />
    <meta
      property="og:description"
      content="Attorney Online is an online version of the world-renowned courtroom drama simulator that allows you to create and play out cases in an off-the-cuff format."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://web.aceattorneyonline.com/" />
    <meta
      property="og:image"
      content="https://repository-images.githubusercontent.com/78860508/89fcba80-aafd-11e9-80db-c5b10c01aba9"
    />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Attorney Online" />
    <meta
      property="twitter:description"
      content="Attorney Online is an online version of the world-renowned courtroom drama simulator that allows you to create and play out cases in an off-the-cuff format."
    />
    <meta property="twitter:url" content="http://web.aceattorneyonline.com/" />
    <meta
      property="twitter:image"
      content="https://repository-images.githubusercontent.com/78860508/89fcba80-aafd-11e9-80db-c5b10c01aba9"
    />

    <meta
      http-equiv="Content-Security-Policy"
      content="
		script-src-elem 'self' 'unsafe-inline' blob: https://hcaptcha.com https://*.hcaptcha.com;
		style-src-elem 'self' 'unsafe-inline' https://golden-layout.com;
		script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://hcaptcha.com https://*.hcaptcha.com;
		style-src 'self' 'unsafe-inline' https://golden-layout.com https://hcaptcha.com https://*.hcaptcha.com;
		img-src 'self' data: file: *;
		frame-src https://hcaptcha.com https://*.hcaptcha.com;
		connect-src 'self' ws: file: * https://hcaptcha.com https://*.hcaptcha.com;
		media-src 'self' file: *;"
    />

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="logo-new.png" />
    <!-- Runtime-swapped stylesheets; hrefs set on startup by client.ts -->
    <link rel="stylesheet" type="text/css" href="" id="client_theme" />
    <link rel="stylesheet" type="text/css" href="" id="chatbox_theme" />
    <link rel="stylesheet" type="text/css" href="" id="nameplate_setting" />
    <link rel="stylesheet" type="text/css" href="" id="mod_ui" />
    <link rel="stylesheet" type="text/css" href="" id="effect_css" />
    <link
      type="text/css"
      rel="stylesheet"
      href="https://golden-layout.com/files/latest/css/goldenlayout-dark-theme.css"
    />
    <style>
      #client_ooclog {
        text-align: left;
      }

      #client_ooclog a {
        color: white;
      }
    </style>
  </head>

  <body>
    <div
      id="voice_speaker_overlay"
      class="voice-speaker-overlay"
      aria-live="polite"
      aria-label="Voice chat speakers"
    ></div>
    <div id="client_waiting">
      <noscript>
        <p style="color: red">webAO requires JavaScript to work</p>
      </noscript>
      <div id="client_loading">
        <h1 id="client_loadingtext">Loading</h1>
      </div>
      <div id="client_secondfactor" style="display: none">
        <center>
          <p>You seem to be new 👋</p>
          <form method="POST">
            <div
              class="h-captcha"
              data-sitekey="6cbe7d73-706d-4e4b-9147-8b9aebb83b5d"
              data-theme="dark"
              data-callback="hcallback"
            ></div>
            <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
          </form>
        </center>
      </div>
      <div id="client_charselect">
        <p>Choose your character</p>
        <button data-action="pickChar" data-char="-1">Or spectate</button>
        <br /><br />
        <input
          id="client_charactersearch"
          placeholder="Search"
          data-action="chartable_filter" data-event="input"
        />
        <br /><br />
        <div id="client_chartable"></div>
      </div>
    </div>
    <div id="client_error_overlay" style="display: none">
      <div id="client_error">
        <div id="client_error_icon">&#x26A0;</div>
        <h2 id="client_errortext"></h2>
        <p id="client_error_code">
          Error code: <span id="error_id">(none)</span>
        </p>
        <button id="client_reconnect" data-action="ReconnectButton">
          Reconnect
        </button>
        <p id="client_error_help">
          Having trouble?
          <a href="https://discord.gg/9rYQVVQ" target="_blank">Join us on Discord</a>
        </p>
      </div>
    </div>
    <script type="module" src="../src/main.ts"></script>
  </body>

  <template id="client_wrapper">
    <meta name="frame-title" lang="en" content="Game" />
    <div id="client_icwrapper">
      <div id="client_background">
        <div id="client_gamewindow">
          <div id="client_fullview">
            <img id="client_court" />
            <div id="client_stitch_court">
              <img id="client_court_def" data-action="imgError" data-event="error" />
              <img id="client_court_deft" data-action="imgError" data-event="error" />
              <img id="client_court_wit" data-action="imgError" data-event="error" />
              <img id="client_court_prot" data-action="imgError" data-event="error" />
              <img id="client_court_pro" data-action="imgError" data-event="error" />
            </div>
            <div
              id="client_def_pair_char"
              class="client_char"
              alt="Paired character"
            >
              <img id="client_def_pair_img" data-action="charError" data-event="error" />
            </div>
            <div id="client_def_char" class="client_char" alt="Character">
              <img id="client_def_char_img" data-action="charError" data-event="error" />
            </div>
            <div
              id="client_wit_pair_char"
              class="client_char"
              alt="Paired character"
            >
              <img id="client_wit_pair_img" data-action="charError" data-event="error" />
            </div>
            <div id="client_wit_char" class="client_char" alt="Character">
              <img id="client_wit_char_img" data-action="charError" data-event="error" />
            </div>
            <div
              id="client_pro_pair_char"
              class="client_char"
              alt="Paired character"
            >
              <img id="client_pro_pair_img" data-action="charError" data-event="error" />
            </div>
            <div id="client_pro_char" class="client_char" alt="Character">
              <img id="client_pro_char_img" data-action="charError" data-event="error" />
            </div>
            <img id="client_def_bench" class="client_bench" />
            <img id="client_wit_bench" class="client_bench" />
            <img id="client_pro_bench" class="client_bench" />
          </div>
          <div id="client_classicview">
            <img id="client_court_classic" data-action="imgError" data-event="error" />
            <div
              id="client_pair_char"
              class="client_char"
              alt="Paired character"
            >
              <img id="client_pair_img" data-action="charError" data-event="error" />
            </div>
            <div id="client_char" class="client_char" alt="Character">
              <img id="client_char_img" data-action="charError" data-event="error" />
            </div>
            <img id="client_bench_classic" class="client_bench" />
          </div>
          <div
            id="client_fg"
            alt="Various overlay"
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
          ></div>
          <img
            id="client_evi"
            src=""
            alt="Character Evidence"
            data-action="imgError" data-event="error"
          />
          <img
            id="client_testimony"
            alt="Testimony overlay"
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
            data-action="imgError" data-event="error"
          />
          <img
            id="client_shout"
            alt="Shout overlay"
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
          />
          <div id="client_chatcontainer" style="font-size: 12px; opacity: 0">
            <div id="client_chatdecoration"></div>
            <div id="client_name">
              <p id="client_inner_name"></p>
            </div>
            <div id="client_chat">
              <p id="client_inner_chat"></p>
              <div id="client_chatwaiting">&#9658;</div>
            </div>
          </div>
          <div id="client_trackstatus">
            <marquee id="client_trackstatustext">None</marquee>
          </div>
          <div id="client_clock">
            <p id="client_clock_date"></p>
            <p id="client_clock_time"></p>
            <p id="client_clock_month"></p>
            <p id="client_clock_weekday"></p>
          </div>
        </div>
      </div>
      <form data-action="preventDefault" data-event="submit">
        <input
          id="client_inputbox"
          class="long"
          type="text"
          data-action="onICEnter" data-event="keypress"
          placeholder="Say something&hellip;"
          autocomplete="off"
        />
      </form>
      <div id="client_bars">
        <span id="client_defense_hp" class="health-box">
          <div class="health-bar"></div>
        </span>
        <span id="client_prosecutor_hp" class="health-box">
          <div class="health-bar"></div>
        </span>
      </div>
    </div>
  </template>

  <template id="icoptions">
    <div id="client_iccontrols">
      <meta name="frame-title" lang="en" content="miscellaneous" />
      <div id="client_emo"></div>
      <br />
      <div id="character_options">
        <div id="emote_options">
          <button
            id="button_1"
            alt="Hold it!"
            class="client_button"
            data-action="toggleShout" data-shout="1"
          >
            Hold it!
          </button>
          <button
            id="button_2"
            alt="Objection!"
            class="client_button"
            data-action="toggleShout" data-shout="2"
          >
            Objection!
          </button>
          <button
            id="button_3"
            alt="Take That!"
            class="client_button"
            data-action="toggleShout" data-shout="3"
          >
            Take That!
          </button>
          <button
            id="button_4"
            alt="Custom"
            class="client_button"
            data-action="toggleShout" data-shout="4"
            style="display: none"
          >
            Custom
          </button>
          <br />
          <br />
          <label for="textcolor">Text Color:</label>
          <select id="textcolor" name="textcolor">
            <option value="0">White</option>
            <option value="1">Green</option>
            <option value="2">Red</option>
            <option value="3">Orange</option>
            <option value="4">Blue</option>
          </select>
          <label for="sendsfx"> SFX: </label>
          <input
            type="checkbox"
            id="sendsfx"
            name="sendsfx"
            value="sendsfx"
            checked
          />
          <label for="sendpreanim"> Preanimation: </label>
          <input
            type="checkbox"
            id="sendpreanim"
            name="sendpreanim"
            value="sendpreanim"
          />
          <br />
          <br />
          <button
            id="button_flip"
            alt="Flip"
            class="client_button"
            data-action="toggleEffect"
            style="display: none"
          >
            Flip
          </button>
          <button
            id="button_flash"
            alt="Flash"
            class="client_button"
            data-action="toggleEffect"
          >
            Flash
          </button>
          <button
            id="button_shake"
            alt="Shake"
            class="client_button"
            data-action="toggleEffect"
            style="display: none"
          >
            Shake
          </button>
        </div>
        <br />
        <br />
        <div id="character_options">
          <label for="role_select">Role:</label>
          <select
            id="role_select"
            name="role_select"
            data-action="changeRoleOOC" data-event="change"
          >
            <option value="">Default</option>
            <option value="def">Defense</option>
            <option value="pro">Prosecution</option>
            <option value="jud">Judge</option>
            <option value="wit">Witness</option>
            <option value="hld">Helper Defense</option>
            <option value="hlp">Helper Prosecution</option>
            <option value="jur">Jury</option>
            <option value="sea">Seance</option>
          </select>
          <br />
          <br />
          <button
            id="char_change"
            alt="Change"
            class="client_button hover_button"
            data-action="changeCharacter"
          >
            Change Character
          </button>
          <button
            id="char_random"
            alt="Random"
            class="client_button hover_button"
            data-action="randomCharacterOOC"
          >
            Random Character
          </button>
          <br />
          <br />
          <span id="pairing" style="display: none">
            <button
              id="button_toggle_pairing"
              alt="Pairing"
              class="client_button"
              data-action="toggleElement" data-element="pairing_settings"
            >
              Pairing
            </button>
            <span id="pairing_settings" style="display: none">
              <label for="pair_select">Pairing partner:</label>
              <select name="pair_select" id="pair_select">
                <option value="-1">None</option>
              </select>
              <table
                style="border: none; margin-left: auto; margin-right: auto"
              >
                <tr>
                  <td>
                    <p>Horizontal offset:</p>
                  </td>
                  <td>
                    <input
                      type="range"
                      name="pair_offset"
                      id="pair_offset"
                      min="-100"
                      max="100"
                      value="0"
                    />
                  </td>
                </tr>
                <tr id="y_offset" style="display: none">
                  <td>
                    <p>Vertical offset:</p>
                  </td>
                  <td>
                    <input
                      type="range"
                      name="pair_y_offset"
                      id="pair_y_offset"
                      min="-100"
                      max="100"
                      value="0"
                    />
                  </td>
                </tr>
              </table>
              <input
                id="pair_reset"
                type="button"
                value="Reset"
                data-action="resetOffset"
              />
            </span>
          </span>
          <br />
          <br />
          <span id="cccc" style="display: none">
            <label for="ic_chat_name">Custom Showname:</label>
            <input id="ic_chat_name" name="ic_chat_name" type="text" />
            <br />
            <label for="showname">Show others:</label>
            <input
              id="showname"
              name="showname"
              type="checkbox"
              data-action="showname_click"
              checked
            />
            <br />
            <br />
            <label for="check_nonint">Noninterrupting Preanimation:</label>
            <input type="checkbox" name="check_nonint" id="check_nonint" />
          </span>
          <br />
          <br />
          <span id="2.7" style="display: none">
            <label for="check_loopsfx">Looping SFX:</label>
            <input type="checkbox" name="check_loopsfx" id="check_loopsfx" />
          </span>
          <br />
          <br />
          <span id="2.8" style="display: none">
            <label for="check_additive">Additive:</label>
            <input type="checkbox" name="check_additive" id="check_additive" />
            <br />
            <br />
            <label for="effect_select">Effect:</label>
            <select id="effect_select" name="effect_select">
              <option value="||">None</option>
              <option value="realization||sfx-realization">Realization</option>
              <option value="confetti||sfx-gallerycheer">Confetti</option>
              <option value="rain-weak||sfx-rain">Weak Rain</option>
              <option value="rain||sfx-rain">Rain</option>
              <option value="rain-strong||sfx-rain">Strong Rain</option>
            </select>
          </span>
        </div>
      </div>
      <fieldset style="margin: 10px">
        <legend>Actions</legend>
        <!-- Judge Commands -->
        <span id="judge_action" style="display: none">
          <span
            id="menu_wt"
            data-action="initWT"
            class="judge_button"
            style="color: blue"
            ><i>Witness<br />Testimony</i></span
          >

          <span
            id="menu_ce"
            data-action="initCE"
            class="judge_button"
            style="color: red"
            ><i>Cross<br />Examination</i></span
          >

          <span
            id="menu_nguilty"
            data-action="notguilty"
            class="judge_button"
            style="
              color: white;
              font-family: serif;
              text-shadow:
                -1px 0 #000,
                0 1px #000,
                1px 0 #000,
                0 -1px #000;
              font-size: 1.5em;
              line-height: 0.75;
            "
            >Not<br />Guilty</span
          >

          <span
            id="menu_guilty"
            data-action="guilty"
            class="judge_button"
            style="color: black; font-family: serif; font-size: 1.5em"
            >Guilty</span
          >

          <br />
          <span style="display: inline-block; vertical-align: middle">
            <span id="menu_rhpd" data-action="redHPD" class="healthchange_button">
              &#8863;
            </span>
            <span style="font-size: 1.25em">Defense</span>
            <span id="menu_ahpd" data-action="addHPD" class="healthchange_button">
              &#8862;
            </span>
          </span>
          <span style="display: inline-block; vertical-align: middle">
            <span id="menu_ahpp" data-action="addHPP" class="healthchange_button">
              &#8862;
            </span>
            <span style="font-size: 1.25em">Prosecution</span>
            <span id="menu_rhpp" data-action="redHPP" class="healthchange_button">
              &#8863;
            </span>
          </span>
        </span>
        <!-- No Commands -->
        <span id="no_action"> No judge actions available for this role. </span>
        <br />
        <br />
        <span id="muting">
          <label for="mute_select" style="float: left"
            >Mute a character:
          </label>
          <select
            name="mute_select"
            id="mute_select"
            data-action="mutelist_click" data-event="change"
          ></select>
        </span>
      </fieldset>
    </div>
  </template>

  <template id="mainmenu">

    <div id="client_menu">

        <fieldset style="text-align: left">

      <span class="menu_content" id="content_2">
        <meta name="frame-title" lang="en" content="Evidence" />
        <fieldset
          style="text-align: left; display: flex; flex-direction: column"
        >
          <legend>Information</legend>
          <hr />
          <div style="display: flex">
            <img
              id="evi_preview"
              class="evi_icon"
              src=""
              alt="Evidence Icon"
              data-action="imgError" data-event="error"
