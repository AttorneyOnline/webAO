name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Type Check
        run: bunx tsc --noEmit
      - name: Run Tests
        run: bun test
      - name: Build
        run: bun run build
